<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign 2 Speak</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/17.0.2/umd/react.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/17.0.2/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/6.26.0/babel.min.js"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; transition: background-color 0.3s, color 0.3s; }
        body.dark { background-color: #1a202c; color: #e2e8f0; }
        #webcam-el { transform: scaleX(-1); }
        .webcam-mirror { transform: scaleX(-1); }
        .asl-video-output { max-width: 100%; max-height: 300px; border-radius: 0.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #e0e0e0; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-track { background: #2d3748; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #888; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #4a5568; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ─── Settings / Gear menu ────────────────────────────────────────────────────
        function SettingsGear({ isDarkMode, toggleDarkMode }) {
            const [isOpen, setIsOpen] = useState(false);
            const ref = useRef(null);

            useEffect(() => {
                const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setIsOpen(false); };
                document.addEventListener('mousedown', handler);
                return () => document.removeEventListener('mousedown', handler);
            }, []);

            return (
                <div className="relative" ref={ref}>
                    <button onClick={() => setIsOpen(!isOpen)}
                        className="text-gray-600 dark:text-gray-300 hover:text-gray-800 dark:hover:text-gray-100 focus:outline-none p-1 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors duration-200"
                        aria-label="Settings menu">
                        <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </button>
                    {isOpen && (
                        <div className="absolute right-0 mt-2 w-48 bg-white dark:bg-gray-700 rounded-lg shadow-lg py-2 z-50 border border-gray-200 dark:border-gray-600">
                            <div onClick={() => { toggleDarkMode(); setIsOpen(false); }}
                                className="px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-600 cursor-pointer flex items-center text-gray-800 dark:text-gray-200 transition-colors duration-200">
                                <span className="mr-2">{isDarkMode ? '☀️' : '🌙'}</span>
                                {isDarkMode ? 'Light Mode' : 'Dark Mode'}
                            </div>
                            <div className="border-t border-gray-200 dark:border-gray-600 my-1"></div>
                            <div onClick={() => { window.location.href = '/api/logout'; }}
                                className="px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-600 cursor-pointer flex items-center text-red-600 dark:text-red-400 transition-colors duration-200">
                                <span className="mr-2">🚪</span>Sign Out
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ─── Sign-to-Text panel ──────────────────────────────────────────────────────
        function SignToText() {
            const videoRef   = useRef(null);
            const canvasRef  = useRef(null);
            const streamRef  = useRef(null);
            const intervalRef = useRef(null);

            const [cameraOn,  setCameraOn]  = useState(false);
            const [currentLetter, setCurrentLetter] = useState('—');
            const [sentence,  setSentence]  = useState('');
            const [statusMsg, setStatusMsg] = useState('Camera off');
            const [predicting, setPredicting] = useState(false);

            // stable letter tracking
            const lastLetterRef    = useRef('');
            const lastLetterTime   = useRef(0);
            const HOLD_MS = 1200;
            const PRED_INTERVAL_MS = 400;

            const startCamera = async () => {
                try {
                    const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
                    streamRef.current = s;
                    videoRef.current.srcObject = s;
                    setCameraOn(true);
                    setStatusMsg('Camera active — show an ASL letter');
                    setPredicting(true);
                    intervalRef.current = setInterval(captureAndPredict, PRED_INTERVAL_MS);
                } catch (e) {
                    setStatusMsg('Camera error: ' + e.message);
                }
            };

            const stopCamera = () => {
                clearInterval(intervalRef.current);
                setPredicting(false);
                if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
                if (videoRef.current) videoRef.current.srcObject = null;
                setCameraOn(false);
                setCurrentLetter('—');
                setStatusMsg('Camera off');
                lastLetterRef.current = '';
            };

            const captureAndPredict = async () => {
                const video  = videoRef.current;
                const canvas = canvasRef.current;
                if (!video || !canvas || video.readyState < 2) return;

                canvas.width  = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const dataUrl = canvas.toDataURL('image/png');

                try {
                    const upRes  = await fetch('/upload_frame', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ image: dataUrl }) });
                    const upData = await upRes.json();
                    if (upData.status !== 'success') return;

                    const prRes  = await fetch('/predict', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token: upData.token }) });
                    const prData = await prRes.json();
                    const letter = prData.result || '';

                    if (letter && /^[A-Z]$/.test(letter)) {
                        setCurrentLetter(letter);
                        const now = Date.now();
                        if (letter === lastLetterRef.current) {
                            if (now - lastLetterTime.current >= HOLD_MS) {
                                setSentence(prev => prev + letter);
                                lastLetterTime.current = now + HOLD_MS * 999; // prevent re-trigger
                            }
                        } else {
                            lastLetterRef.current  = letter;
                            lastLetterTime.current = now;
                        }
                    } else {
                        setCurrentLetter('—');
                        lastLetterRef.current = '';
                    }
                } catch (_) {}
            };

            useEffect(() => () => { stopCamera(); }, []);

            return (
                <div className="bg-white dark:bg-gray-800 rounded-xl shadow-lg overflow-hidden border border-gray-200 dark:border-gray-700 flex flex-col">
                    <div className="p-4 border-b border-gray-200 dark:border-gray-700">
                        <h2 className="text-xl font-bold text-indigo-700 dark:text-indigo-400">Sign → Text</h2>
                        <p className="text-gray-500 dark:text-gray-400 text-sm">Show ASL letters to your webcam</p>
                    </div>

                    {/* Video */}
                    <div className="relative bg-black">
                        <video id="webcam-el" ref={videoRef} autoPlay playsInline muted
                            className="w-full h-56 object-cover webcam-mirror" />
                        <canvas ref={canvasRef} className="hidden" />
                        {!cameraOn && (
                            <div className="absolute inset-0 flex items-center justify-center text-gray-400 text-sm">
                                Camera off
                            </div>
                        )}
                        {cameraOn && (
                            <div className="absolute top-2 left-2 bg-red-500 text-white px-2 py-0.5 rounded-full text-xs font-medium flex items-center gap-1">
                                <span className="w-2 h-2 rounded-full bg-white animate-pulse inline-block"></span> Live
                            </div>
                        )}
                        {/* Live letter overlay */}
                        {cameraOn && currentLetter !== '—' && (
                            <div className="absolute top-2 right-2 w-12 h-12 bg-indigo-600 bg-opacity-90 rounded-xl flex items-center justify-center">
                                <span className="text-white text-2xl font-bold">{currentLetter}</span>
                            </div>
                        )}
                    </div>

                    {/* Controls */}
                    <div className="p-4 flex gap-2">
                        {!cameraOn ? (
                            <button onClick={startCamera}
                                className="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-lg text-sm transition">
                                Start Camera
                            </button>
                        ) : (
                            <button onClick={stopCamera}
                                className="flex-1 bg-gray-500 hover:bg-gray-600 text-white font-medium py-2 px-4 rounded-lg text-sm transition">
                                Stop Camera
                            </button>
                        )}
                        <button onClick={() => setSentence('')}
                            className="bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 font-medium py-2 px-3 rounded-lg text-sm transition">
                            Clear
                        </button>
                        <button onClick={() => setSentence(prev => prev + ' ')}
                            className="bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 font-medium py-2 px-3 rounded-lg text-sm transition">
                            Space
                        </button>
                    </div>

                    {/* Big letter */}
                    <div className="flex flex-col items-center py-2">
                        <span className="text-7xl font-bold text-indigo-600 dark:text-indigo-400 leading-none">{currentLetter}</span>
                        <span className="text-xs text-gray-400 mt-1">Current letter</span>
                    </div>

                    {/* Sentence */}
                    <div className="mx-4 mb-4 bg-indigo-50 dark:bg-indigo-900/20 rounded-lg p-3 border border-indigo-100 dark:border-indigo-800/30 min-h-[3rem]">
                        <p className="text-xs font-semibold text-indigo-500 mb-1 uppercase tracking-wide">Sentence</p>
                        <p className="text-lg font-semibold text-gray-800 dark:text-gray-100 tracking-widest break-all">
                            {sentence || <span className="text-gray-400 font-normal text-sm">Hold a letter steady for ~1s to build your sentence</span>}
                        </p>
                    </div>

                    {/* Status */}
                    <div className="px-4 pb-4">
                        <p className="text-xs text-gray-400 italic">{statusMsg}</p>
                    </div>
                </div>
            );
        }

        // ─── Speech-to-Signed panel ──────────────────────────────────────────────────
        function SpeechToASL() {
            const [isRecording,   setIsRecording]   = useState(false);
            const [processing,    setProcessing]    = useState(false);
            const [transcription, setTranscription] = useState('');
            const [gifUrl,        setGifUrl]        = useState('');
            const [videoUrl,      setVideoUrl]      = useState('');
            const [log,           setLog]           = useState([]);
            const [textInput,     setTextInput]     = useState('');

            const mediaRecorderRef = useRef(null);
            const audioChunksRef   = useRef([]);

            const addLog = (msg) => setLog(prev => [`[${new Date().toLocaleTimeString()}] ${msg}`, ...prev].slice(0, 30));

            const startRecording = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    audioChunksRef.current = [];
                    mediaRecorderRef.current = new MediaRecorder(stream);
                    mediaRecorderRef.current.ondataavailable = e => audioChunksRef.current.push(e.data);
                    mediaRecorderRef.current.onstop = async () => {
                        stream.getTracks().forEach(t => t.stop());
                        const blob = new Blob(audioChunksRef.current, { type: 'audio/webm' });
                        await submitAudio(blob);
                    };
                    mediaRecorderRef.current.start();
                    setIsRecording(true);
                    addLog('Recording started…');
                } catch (e) {
                    addLog('Mic error: ' + e.message);
                    alert('Could not access microphone: ' + e.message);
                }
            };

            const stopRecording = () => {
                if (mediaRecorderRef.current && isRecording) {
                    mediaRecorderRef.current.stop();
                    setIsRecording(false);
                    addLog('Recording stopped. Sending to server…');
                }
            };

            const submitAudio = async (blob) => {
                setProcessing(true);
                setGifUrl('');
                setVideoUrl('');
                const form = new FormData();
                form.append('audio', blob, 'recording.webm');
                try {
                    const res = await fetch('/process', { method: 'POST', body: form });
                    if (!res.ok) { addLog('Server error: ' + res.status); setProcessing(false); return; }
                    await readSSE(res);
                } catch (e) {
                    addLog('Error: ' + e.message);
                } finally {
                    setProcessing(false);
                }
            };

            const submitText = async () => {
                const text = textInput.trim();
                if (!text) return;
                setProcessing(true);
                setGifUrl('');
                setVideoUrl('');
                setTranscription(text);
                addLog('Translating text: ' + text);
                try {
                    const res = await fetch('/process_text', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text })
                    });
                    if (!res.ok) { addLog('Server error: ' + res.status); setProcessing(false); return; }
                    await readSSE(res);
                } catch (e) {
                    addLog('Error: ' + e.message);
                } finally {
                    setProcessing(false);
                }
            };

            const readSSE = async (response) => {
                const reader  = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();
                    for (const line of lines) {
                        if (!line.startsWith('data:')) continue;
                        try {
                            const p = JSON.parse(line.slice(5).trim());
                            if (p.step === 'transcription') { setTranscription(p.transcription); addLog('Transcribed: ' + p.transcription); }
                            else if (p.step === 'pose_video') { setVideoUrl(p.url + '?t=' + Date.now()); addLog('Realistic video ready!'); }
                            else if (p.step === 'pose_gif')  { setGifUrl(p.url + '?t=' + Date.now()); addLog('Animation ready!'); }
                            else if (p.step === 'warning')   { addLog('⚠ ' + p.message); }
                            else if (p.step === 'error')     { addLog('✖ ' + p.error); }
                            else if (p.step === 'info')      { addLog(p.message); }
                        } catch (_) {}
                    }
                }
            };

            return (
                <div className="bg-white dark:bg-gray-800 rounded-xl shadow-lg overflow-hidden border border-gray-200 dark:border-gray-700 flex flex-col">
                    <div className="p-4 border-b border-gray-200 dark:border-gray-700">
                        <h2 className="text-xl font-bold text-indigo-700 dark:text-indigo-400">Speech / Text → ASL</h2>
                        <p className="text-gray-500 dark:text-gray-400 text-sm">Speak or type to get an ASL animation</p>
                    </div>

                    {/* Text input */}
                    <div className="p-4 flex gap-2">
                        <input
                            type="text"
                            value={textInput}
                            onChange={e => setTextInput(e.target.value)}
                            onKeyDown={e => e.key === 'Enter' && submitText()}
                            placeholder="Type words here…"
                            className="flex-1 border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-gray-800 dark:text-gray-100"
                        />
                        <button onClick={submitText} disabled={processing || !textInput.trim()}
                            className="bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white px-4 py-2 rounded-lg text-sm font-medium transition">
                            Translate
                        </button>
                    </div>

                    {/* Mic button */}
                    <div className="px-4 pb-4">
                        <button
                            onClick={isRecording ? stopRecording : startRecording}
                            disabled={processing}
                            className={`w-full flex items-center justify-center gap-2 py-2 px-4 rounded-lg text-sm font-medium transition disabled:opacity-50 ${
                                isRecording
                                    ? 'bg-red-500 hover:bg-red-600 text-white'
                                    : 'bg-green-600 hover:bg-green-700 text-white'
                            }`}>
                            <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M12 14a3 3 0 003-3V5a3 3 0 00-6 0v6a3 3 0 003 3zm5-3a5 5 0 01-10 0H5a7 7 0 0014 0h-2z"/>
                            </svg>
                            {isRecording ? 'Stop Recording' : 'Start Recording'}
                        </button>
                        {isRecording && <p className="text-xs text-red-500 text-center mt-1 animate-pulse">● Recording… click to stop</p>}
                    </div>

                    {/* Transcription */}
                    <div className="mx-4 bg-gray-50 dark:bg-gray-700 rounded-lg p-3 border border-gray-200 dark:border-gray-600">
                        <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Transcription</p>
                        <p className="text-sm text-gray-700 dark:text-gray-200 italic min-h-[1.5rem]">{transcription || '—'}</p>
                    </div>

                    {/* Video / GIF / loading output */}
                    <div className="m-4 bg-gray-50 dark:bg-gray-700 rounded-lg p-3 border border-gray-200 dark:border-gray-600 flex flex-col items-center justify-center min-h-[180px]">
                        <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2 self-start">
                            ASL Output {videoUrl ? '(Realistic Video)' : gifUrl ? '(Skeleton GIF)' : ''}
                        </p>

                        {processing && !videoUrl && !gifUrl && (
                            <div className="flex flex-col items-center gap-2 text-indigo-500 py-4">
                                <svg className="animate-spin w-8 h-8" fill="none" viewBox="0 0 24 24">
                                    <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                                    <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
                                </svg>
                                <span className="text-sm">Generating realistic video…</span>
                            </div>
                        )}

                        {videoUrl ? (
                            <video
                                src={videoUrl}
                                controls
                                autoPlay
                                loop
                                className="asl-video-output"
                            />
                        ) : gifUrl ? (
                            <img src={gifUrl} alt="ASL skeleton animation" className="max-w-full rounded-lg" />
                        ) : !processing && (
                            <div className="flex flex-col items-center text-gray-400 py-4">
                                <svg className="w-10 h-10 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                </svg>
                                <span className="text-sm">Video will appear here</span>
                            </div>
                        )}
                    </div>

                    {/* Log */}
                    <div className="mx-4 mb-4">
                        <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Log</p>
                        <div className="bg-gray-50 dark:bg-gray-900 rounded-lg p-2 h-24 overflow-y-auto custom-scrollbar font-mono text-xs text-gray-500 dark:text-gray-400">
                            {log.length === 0 && <div>Waiting for input…</div>}
                            {log.map((l, i) => <div key={i} className="border-b border-gray-200 dark:border-gray-700 py-0.5">{l}</div>)}
                        </div>
                    </div>
                </div>
            );
        }

        // ─── Root App ────────────────────────────────────────────────────────────────
        function Sign2SpeakApp() {
            const [isDarkMode, setIsDarkMode] = useState(false);

            const toggleDarkMode = () => {
                const next = !isDarkMode;
                setIsDarkMode(next);
                localStorage.setItem('darkMode', JSON.stringify(next));
                document.body.classList.toggle('dark', next);
            };

            useEffect(() => {
                const saved = localStorage.getItem('darkMode');
                const initial = saved !== null ? JSON.parse(saved) : window.matchMedia('(prefers-color-scheme: dark)').matches;
                setIsDarkMode(initial);
                document.body.classList.toggle('dark', initial);
            }, []);

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Nav */}
                    <nav className="bg-white dark:bg-gray-800 shadow-md py-4 sticky top-0 z-50">
                        <div className="container mx-auto px-6 flex items-center justify-between">
                            <div className="flex items-center">
                                <svg className="w-9 h-9 text-indigo-600 dark:text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M7 11.5V14m0-2.5v-6a1.5 1.5 0 113 0m-3 6a1.5 1.5 0 00-3 0v2a7.5 7.5 0 0015 0v-5a1.5 1.5 0 00-3 0m-6-3V11m0-5.5v-1a1.5 1.5 0 013 0v1m0 0V11m0-5.5a1.5 1.5 0 013 0v3m0 0V11" />
                                </svg>
                                <span className="text-2xl font-bold ml-2 text-indigo-700 dark:text-indigo-400">Sign 2 Speak</span>
                            </div>
                            <div className="flex items-center space-x-6">
                                <a href="/" className="text-gray-600 dark:text-gray-300 hover:text-indigo-600 text-sm font-medium">Home</a>
                                <SettingsGear isDarkMode={isDarkMode} toggleDarkMode={toggleDarkMode} />
                            </div>
                        </div>
                    </nav>

                    {/* Main */}
                    <main className="flex-grow py-8">
                        <div className="container mx-auto px-6">
                            <h1 className="text-3xl font-bold text-center text-indigo-700 dark:text-indigo-400 mb-2">
                                Real-time Translation Dashboard
                            </h1>
                            <p className="text-center text-gray-500 dark:text-gray-400 text-sm mb-8">
                                Sign language ↔ Text, powered by AI
                            </p>

                            {/* Two panels */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
                                <SignToText />
                                <SpeechToASL />
                            </div>

                            {/* How it works */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                                <div className="bg-white dark:bg-gray-800 rounded-xl shadow-lg overflow-hidden border border-gray-200 dark:border-gray-700">
                                    <div className="p-4 border-b border-gray-200 dark:border-gray-700">
                                        <h2 className="text-xl font-bold text-indigo-700 dark:text-indigo-400">How Sign → Text Works</h2>
                                    </div>
                                    <div className="p-4">
                                        <ol className="space-y-4">
                                            {[
                                                ['Webcam Capture', 'Your webcam captures ASL gestures in real-time'],
                                                ['AI Analysis', 'MediaPipe extracts 21 hand landmark coordinates'],
                                                ['ML Translation', 'TensorFlow model maps landmarks to A–Z letters'],
                                                ['Instant Output', 'Hold a letter steady for ~1s to add it to your sentence'],
                                            ].map(([title, desc], i) => (
